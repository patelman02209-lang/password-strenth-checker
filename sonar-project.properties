# Replace CHANGE_ME_* with your SonarCloud organization and project key, then add SONAR_TOKEN in GitHub secrets.
sonar.projectKey=CHANGE_ME_ORG_password-strength-checker
sonar.organization=CHANGE_ME_ORG
sonar.projectName=Password Strength Checker
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests
sonar.test.inclusions=backend/tests/**/*.py
sonar.python.version=3.12
sonar.sourceEncoding=UTF-8

# Populated by CI after pytest / Vitest (see docs/CI_CD_PIPELINE.md)
sonar.python.coverageReportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
